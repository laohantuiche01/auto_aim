# 棋盘格内角点数量
pattern_cols: 11
pattern_rows: 8
# 方格实际尺寸(毫米)，用于计算相机内参
square_size_mm: 40

# 相机内参（运行 ./build/calibrate_camera 后获得的结果填入此处）
# 重投影误差: 0.2437px
camera_matrix: [1809.4822355031245, 0, 697.14569994150293, 0, 1809.4809037947414, 571.90685201331121, 0, 0, 1]
distort_coeffs: [-0.081190039023144409, 0.19231523391750371, 0.00096216291015417384, -0.00049720732747006446, 0]

# 云台到IMU本体的旋转矩阵（通常为单位矩阵，除非云台和IMU有固定安装偏角）
R_gimbal2imubody: [1, 0, 0, 0, 1, 0,  0, 0, 1]

#####-----gimbal参数-----#####
com_port: "/dev/ttyACM0"

camera_name: "hikrobot"
exposure_ms: 5   # 标定时可以使用较短曝光，提高帧率
gain: 16.0       # 曝光时间短时提高增益以保持亮度
vid_pid: "2bdf:0001"
