auto_aim:
  ros__parameters:
    # 敌方颜色
    enemy_color: "blue"  # red, blue

    # 神经网络参数
    yolo_name: "yolov8"  # yolov5, yolov8, yolo11
    classify_model: "/home/laohantuiche/Radar/auto_aim/src/sp_vision_ros/assets/tiny_resnet.onnx"
    yolo11_model_path: "/home/laohantuiche/Radar/auto_aim/src/sp_vision_ros/assets/yolo11.xml"
    yolov8_model_path: "/home/laohantuiche/Radar/auto_aim/src/sp_vision_ros/assets/yolov8.xml"
    yolov5_model_path: "/home/laohantuiche/Radar/auto_aim/src/sp_vision_ros/assets/yolov5.xml"
    device: "CPU"  # CPU, GPU
    min_confidence: 0.8
    use_traditional: true

    # ROI 参数
    use_roi: false
    roi_x: 0
    roi_y: 0
    roi_width: 720
    roi_height: 540

    # 传统方法参数
    threshold: 150.0
    max_angle_error: 45.0  # degree
    min_lightbar_ratio: 1.5
    max_lightbar_ratio: 20.0
    min_lightbar_length: 8
    min_armor_ratio: 1.0
    max_armor_ratio: 5.0
    max_side_ratio: 1.5
    max_rectangular_error: 25.0  # degree